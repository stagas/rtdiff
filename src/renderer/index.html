<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>RTDiff</title>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; worker-src 'self' blob:"
    />
    <link href="./assets/main.css" type="text/css" rel="stylesheet" />
  </head>
  <body>
    <div id="app" class="layout">
      <aside class="sidebar">
        <div class="sidebar-top">
          <h1>RTDiff</h1>
          <p id="repo-state" class="repo-state">Tracking git changes</p>
          <p id="repo-root" class="repo-root"></p>
        </div>

        <div class="totals">
          <div class="total-card">
            <span class="label">Files</span>
            <strong id="total-files">0</strong>
          </div>
          <div class="total-card">
            <span class="label">Added</span>
            <strong id="total-added" class="added">+0</strong>
          </div>
          <div class="total-card">
            <span class="label">Removed</span>
            <strong id="total-removed" class="removed">-0</strong>
          </div>
        </div>

        <div class="sidebar-actions">
          <button id="layout-toggle" type="button">Inline View</button>
        </div>

        <div id="file-list" class="file-list"></div>
      </aside>

      <main id="diff-scroller" class="diff-scroller">
        <p id="empty-state" class="empty-state" hidden></p>
        <div id="diff-sections" class="diff-sections"></div>
      </main>
    </div>

    <script type="module" src="./src/renderer.ts"></script>
  </body>
</html>
