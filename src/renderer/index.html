<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>RTDiff</title>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; worker-src 'self' blob:"
    />
    <link href="./assets/main.css" type="text/css" rel="stylesheet" />
  </head>
  <body>
    <div id="app" class="layout">
      <aside class="sidebar">
        <div class="totals">
          <div class="total-inline">
            <span class="metric"><strong id="total-files">0</strong></span>
            <span class="metric"><strong id="total-added" class="added">0</strong></span>
            <span class="metric"><strong id="total-removed" class="removed">0</strong></span>
          </div>
        </div>

        <div class="sidebar-actions">
          <button id="layout-toggle" type="button" aria-label="Toggle diff layout mode">
            <span class="layout-icon layout-sbs" aria-hidden="true">▥</span>
            <span class="layout-icon layout-inline" aria-hidden="true">☰</span>
          </button>
        </div>

        <div id="file-list" class="file-list"></div>
      </aside>

      <main id="diff-scroller" class="diff-scroller">
        <p id="empty-state" class="empty-state" hidden></p>
        <div id="diff-sections" class="diff-sections"></div>
      </main>
    </div>

    <script type="module" src="./src/renderer.ts"></script>
  </body>
</html>
