name: Release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write

jobs:
  publish:
    name: Publish (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Install Linux packaging dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm
          sudo apt-get install -y libfuse2t64 || sudo apt-get install -y libfuse2

      - name: Ensure electron-builder binaries are executable (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          chmod +x node_modules/app-builder-bin/linux/x64/app-builder || true
          chmod +x node_modules/7zip-bin/linux/x64/7za || true

      - name: Build and publish
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            macos-latest)
              bun run build
              CSC_IDENTITY_AUTO_DISCOVERY=false bunx electron-builder --mac --publish always
              ;;
            ubuntu-latest)
              bun run build
              bunx electron-builder --linux AppImage deb --publish always
              ;;
            windows-latest)
              bun run build
              bunx electron-builder --win --publish always
              ;;
          esac
        env:
          # Optional notarization secrets
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
