name: Build and Release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Install Linux packaging dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm
          sudo apt-get install -y libfuse2t64 || sudo apt-get install -y libfuse2

      - name: Ensure electron-builder binaries are executable (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          chmod +x node_modules/app-builder-bin/linux/x64/app-builder || true
          chmod +x node_modules/7zip-bin/linux/x64/7za || true

      - name: Build packages
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            macos-latest)
              bun run build
              CSC_IDENTITY_AUTO_DISCOVERY=false bunx electron-builder --mac --publish never
              ;;
            ubuntu-latest)
              bun run build
              bunx electron-builder --linux AppImage deb --publish never
              ;;
            windows-latest)
              bun run build
              bunx electron-builder --win --publish never
              ;;
          esac
        env:
          # Optional notarization secrets
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/*.blockmap
            dist/latest*.yml
            dist/latest*.yaml
          if-no-files-found: ignore
          retention-days: 7

  release:
    name: Update GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: release-*
          merge-multiple: true

      - name: Build changelog
        id: changelog
        uses: ardalanamini/auto-changelog@v4
        continue-on-error: true
        with:
          mention-authors: false
          mention-new-contributors: false
          include-compare-link: false
          semver: true

      - name: Create or update release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changelog }}
          generateReleaseNotes: true
          artifacts: release-artifacts/**/*
          artifactErrorsFailBuild: true
          allowUpdates: true
          replacesArtifacts: true
          removeArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
